name: Build and Push Docker Image

on:
  # 每月1号凌晨2点自动构建
  schedule:
    - cron: "0 2 1 * *"

  # 推送到 main 分支时触发
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "start.sh"
      - ".github/workflows/docker-build.yml"

  # 允许手动触发
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  # DockerHub 用户名，需要在 GitHub Secrets 中设置 DOCKERHUB_USERNAME
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nezha-agent-v2
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取 Nezha Agent 最新版本
        id: nezha_version
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/nezhahq/agent/releases/latest | jq -r '.tag_name // empty')
          if [ -z "${VERSION}" ]; then
            echo "Failed to fetch Nezha Agent version" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Nezha Agent Version: ${VERSION}"

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            # 设置 latest 标签
            type=raw,value=latest,enable={{is_default_branch}}
            # 使用 Nezha Agent 的版本号
            type=raw,value=${{ steps.nezha_version.outputs.version }}
            # 根据日期生成标签 (YYYYMMDD 格式)
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEZHA_AGENT_VERSION=${{ steps.nezha_version.outputs.version }}

      - name: 创建同版本 Git 标签
        id: repository_tag
        run: |
          VERSION="${{ steps.nezha_version.outputs.version }}"
          TAG_REF="refs/tags/${VERSION}"

          if git ls-remote --exit-code --tags origin "${TAG_REF}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists, skipping."
            echo "tag_created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Nezha Agent ${VERSION}"

          if git push origin "${TAG_REF}"; then
            echo "Created tag ${VERSION}"
            echo "tag_created=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "${TAG_REF}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} was created by another workflow run, skipping."
            echo "tag_created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Failed to push tag ${VERSION}" >&2
          exit 1

      - name: 保持定时工作流活跃
        if: github.event_name == 'schedule'
        id: keepalive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout --detach "origin/${GITHUB_REF_NAME}"
          git commit --allow-empty -m "chore: keep GitHub Actions schedule alive [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "commit_created=true" >> $GITHUB_OUTPUT

      - name: 生成构建摘要
        run: |
          echo "### 🎉 Docker 镜像构建成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像标签:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**拉取命令:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKERHUB_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_IMAGE }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**仓库标签:** ${{ steps.nezha_version.outputs.version }} (created=${{ steps.repository_tag.outputs.tag_created }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**定时任务保活提交:** ${{ steps.keepalive.outputs.commit_created || 'false' }}" >> $GITHUB_STEP_SUMMARY
